{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MapaCNAT | Explorar</title>
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'css/mapa.css' %}">
</head>
<body>
    <header>
        <form action="" method="get" role="search">
            <label for="search">Buscar local:</label>
            <input type="search" id="search" name="q" placeholder="Pesquisar nome, local..." required>
            <button type="submit">Pesquisar</button>
        </form>
    </header>
    <main>
        <div id="map"></div>
        <script src="https://pixijs.download/release/pixi.min.js"></script>
        <script type="module" src="{% static 'js/mapa.js' %}"></script>
    </main>
</body>
</html>
